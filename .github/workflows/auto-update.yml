name: Auto Update Content

on:
  schedule:
    # 每 5 天运行一次 (UTC 时间)
    - cron: '0 0 */5 * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run content update script (Node.js)
        env:
          UPDATE_MODE: ${{ vars.UPDATE_MODE || 'demo' }}
          CONTENT_API_KEY: ${{ secrets.CONTENT_API_KEY }}
        run: |
          echo "🚀 运行内容更新脚本..."
          node scripts/fetch-questions.js
      
      - name: Commit and push if there are changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto update content [skip ci]"
            git push
            echo "✅ 内容已更新并推送"
          else
            echo "ℹ️ 没有新内容需要更新"
          fi
